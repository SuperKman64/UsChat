<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UsChat</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; 
        }
        #setup { padding: 20px; text-align: center; background: #1f1f1f; border-bottom: 1px solid #333; }
        #video-grid { 
            flex: 1; display: grid; grid-template-columns: 1fr; position: relative; background: #000;
            overflow: hidden; gap: 2px;
        }
        video { width: 100%; height: 100%; object-fit: cover; background: #222; }
        #localVideo { 
            position: absolute; width: 120px; height: 180px; top: 20px; right: 20px; 
            border-radius: 12px; border: 2px solid #444; z-index: 10; transform: scaleX(-1);
        }
        #chat-container { height: 250px; background: #1f1f1f; display: flex; flex-direction: column; border-top: 1px solid #333; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .msg { margin-bottom: 8px; padding: 6px 12px; border-radius: 15px; max-width: 80%; width: fit-content; }
        .msg.me { background: #007aff; align-self: flex-end; margin-left: auto; }
        .msg.peer { background: #333; }
        .input-area { padding: 10px; display: flex; gap: 8px; background: #121212; }
        input { 
            flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #444; 
            background: #2c2c2e; color: white; outline: none; 
        }
        button { 
            padding: 10px 20px; border-radius: 20px; border: none; 
            background: #34c759; color: white; font-weight: bold; cursor: pointer; 
        }
        button:disabled { background: #555; }
        @media (min-width: 600px) { #video-grid { grid-template-columns: 1fr 1fr; } #localVideo { position: relative; width: 100%; height: 100%; top: 0; right: 0; border: none; } }
    </style>
</head>
<body>

    <div id="setup">
        <input type="text" id="roomInput" placeholder="Enter Room ID (e.g. my-call)">
        <button id="joinBtn" onclick="joinRoom()">Join Call</button>
    </div>

    <div id="video-grid">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="chatInput" placeholder="iMessage..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const ABLY_KEY = 'FZrirg.C87wig:BxxBpwb6Fcf_gRPEOLReBznlfvEM4cJtGN-tAlDEuEA';
        const myId = 'user-' + Math.random().toString(36).substr(2, 9);
        const ably = new Ably.Realtime({ key: ABLY_KEY, clientId: myId });
        
        let channel, pc, localStream;
        const iceServers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        async function joinRoom() {
            const roomId = document.getElementById('roomInput').value;
            if (!roomId) return alert("Please enter a room name");

            document.getElementById('joinBtn').disabled = true;
            channel = ably.channels.get('room-' + roomId);

            // 1. Get Camera and Mic
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;

            // 2. Subscribe to Signaling (WebRTC handshake)
            channel.subscribe('signal', async (msg) => {
                if (msg.clientId === myId) return;
                const { type, sdp, candidate } = msg.data;

                if (type === 'offer') {
                    await initPeerConnection();
                    await pc.setRemoteDescription(new RTCSessionDescription({ type, sdp }));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    channel.publish('signal', { type: 'answer', sdp: answer.sdp });
                } else if (type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription({ type, sdp }));
                } else if (candidate) {
                    await pc.addIceCandidate(new RTCIceCandidate(candidate));
                }
            });

            // 3. Subscribe to Chat
            channel.subscribe('chat', (msg) => {
                const msgBox = document.getElementById('messages');
                const div = document.createElement('div');
                div.className = `msg ${msg.clientId === myId ? 'me' : 'peer'}`;
                div.textContent = msg.data;
                msgBox.appendChild(div);
                msgBox.scrollTop = msgBox.scrollHeight;
            });

            // 4. Presence: Start call if someone is already there
            channel.presence.subscribe('enter', (member) => {
                if (member.clientId !== myId) initiateCall();
            });

            // Check who is already in the room
            channel.presence.get((err, members) => {
                if (members && members.length > 0) initiateCall();
            });

            channel.presence.enter();
        }

        async function initPeerConnection() {
            if (pc) return;
            pc = new RTCPeerConnection(iceServers);

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (event) => {
                if (event.candidate) channel.publish('signal', { candidate: event.candidate });
            };

            pc.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
        }

        async function initiateCall() {
            await initPeerConnection();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            channel.publish('signal', { type: 'offer', sdp: offer.sdp });
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (input.value.trim() && channel) {
                channel.publish('chat', input.value);
                input.value = '';
            }
        }
    </script>
</body>
</html>
